<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body { background: #09090c; color: white; font-family: "Avenir Next", Avenir, Arial, sans-serif; }
    .canvas { position: relative; width: 1200px; height: 630px; overflow: hidden; isolation: isolate; }
    .arena { position: absolute; z-index: -2; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 62%; }
    .shade { position: absolute; z-index: -1; inset: 0; background: linear-gradient(90deg, rgba(5,5,8,.98) 0%, rgba(5,5,8,.88) 43%, rgba(5,5,8,.26) 75%, rgba(5,5,8,.48) 100%), linear-gradient(0deg, rgba(5,5,8,.92), transparent 45%); }
    .rail { position: absolute; inset: 0 auto 0 0; width: 10px; background: #ff5a1f; }
    .content { display: flex; height: 100%; flex-direction: column; justify-content: space-between; padding: 58px 64px 52px 74px; }
    .top { display: flex; align-items: flex-start; justify-content: space-between; }
    .issue { color: #57d3ff; font-size: 17px; font-weight: 800; line-height: 1.2; text-transform: uppercase; letter-spacing: .14em; }
    .issue::before { content: ""; display: inline-block; width: 40px; height: 3px; margin: 0 14px 5px 0; background: #57d3ff; }
    .avc { width: 240px; height: auto; }
    h1 { max-width: 760px; margin: 0 0 20px; font-family: "Iowan Old Style", Baskerville, Georgia, serif; font-size: 80px; font-weight: 600; line-height: .92; letter-spacing: 0; }
    .thesis { margin: 0; color: #ff6f3c; font-size: 27px; font-weight: 800; line-height: 1.15; letter-spacing: 0; }
    .footer { display: flex; align-items: flex-end; justify-content: space-between; gap: 34px; padding-top: 27px; border-top: 1px solid rgba(255,255,255,.25); }
    .game strong { display: block; margin-bottom: 6px; font-size: 23px; line-height: 1; }
    .game span { color: rgba(255,255,255,.58); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
    .seal { display: flex; align-items: center; gap: 16px; color: rgba(255,255,255,.64); font-size: 12px; font-weight: 800; text-align: right; text-transform: uppercase; letter-spacing: .1em; }
    .suns { width: 72px; height: 72px; object-fit: contain; }
  </style>
</head>
<body>
  <main class="canvas">
    <img class="arena" src="/suns-summer-league-pulse/assets/vegas-courtside-v2.jpg" alt="">
    <div class="shade"></div>
    <div class="rail"></div>
    <div class="content">
      <div class="top">
        <div class="issue">Issue 01 / Owner Preview</div>
        <img class="avc" src="/suns-summer-league-pulse/assets/avc-logo-full-dark.svg" alt="">
      </div>
      <div>
        <h1>Suns Summer<br>League Pulse</h1>
        <p class="thesis">THE TEST IS CONTINUITY.</p>
      </div>
      <div class="footer">
        <div class="game"><strong>Portland vs Phoenix</strong><span>Friday / 8:00 PM Phoenix Time</span></div>
        <div class="seal"><span>Private Owner<br>Briefing</span><img class="suns" src="/suns-summer-league-pulse/assets/phoenix-suns-logo.png" alt=""></div>
      </div>
    </div>
  </main>
</body>
</html>
