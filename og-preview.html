<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; margin: 0; overflow: hidden; }
    body { background: #09090c; color: #fff; font-family: "Avenir Next", Avenir, Arial, sans-serif; }
    .canvas { position: relative; width: 1200px; height: 630px; overflow: hidden; isolation: isolate; }
    .arena { position: absolute; z-index: -2; inset: 0 0 0 auto; width: 500px; height: 100%; object-fit: contain; object-position: right center; filter: saturate(.96) contrast(1.03); }
    .shade { position: absolute; z-index: -1; inset: 0; background: linear-gradient(90deg, #050508 0%, rgba(5,5,8,.98) 42%, rgba(5,5,8,.74) 58%, rgba(5,5,8,.08) 78%, rgba(5,5,8,.05) 100%), linear-gradient(0deg, rgba(5,5,8,.88) 0%, rgba(5,5,8,.58) 13%, transparent 38%); }
    .rail { position: absolute; inset: 0 auto 0 0; width: 10px; background: #ff5a1f; }
    .content { display: grid; height: 100%; grid-template-rows: auto 1fr auto; padding: 48px 58px 42px 74px; }
    .top { display: block; }
    .issue { color: #57d3ff; font-size: 16px; font-weight: 850; line-height: 1.2; text-transform: uppercase; letter-spacing: .14em; }
    .issue::before { content: ""; display: inline-block; width: 40px; height: 3px; margin: 0 14px 5px 0; background: #57d3ff; }
    .avc { width: 190px; height: auto; }
    .result { display: grid; align-content: center; max-width: 590px; padding-top: 18px; }
    .title { margin: 0 0 22px; color: rgba(255,255,255,.72); font-size: 16px; font-weight: 850; text-transform: uppercase; letter-spacing: .13em; }
    .score { display: grid; grid-template-columns: auto 34px auto; gap: 16px; align-items: end; width: max-content; font-variant-numeric: tabular-nums; }
    .side { display: grid; gap: 5px; }
    .side:last-child { text-align: right; }
    .side span { color: rgba(255,255,255,.6); font-size: 15px; font-weight: 850; text-transform: uppercase; letter-spacing: .12em; }
    .side strong { font-family: "Iowan Old Style", Baskerville, Georgia, serif; font-size: 112px; font-weight: 600; line-height: .72; }
    .dash { padding-bottom: 5px; color: #ff5a1f; font-family: Georgia, serif; font-size: 34px; text-align: center; }
    .thesis { max-width: 560px; margin: 30px 0 0; color: #fff; font-family: "Iowan Old Style", Baskerville, Georgia, serif; font-size: 42px; font-weight: 600; line-height: 1.05; }
    .footer { display: grid; grid-template-columns: minmax(0, 1fr) auto auto; align-items: end; gap: 34px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,.24); }
    .footer-copy strong { display: block; margin-bottom: 5px; color: #ff6f3c; font-size: 14px; font-weight: 850; text-transform: uppercase; letter-spacing: .1em; }
    .footer-copy span { color: rgba(255,255,255,.58); font-size: 13px; font-weight: 700; }
    .seal { display: flex; align-items: center; gap: 16px; color: rgba(255,255,255,.64); font-size: 12px; font-weight: 800; text-align: right; text-transform: uppercase; letter-spacing: .1em; }
    .suns { width: 72px; height: 72px; object-fit: contain; }
  </style>
</head>
<body>
  <main class="canvas">
    <img class="arena" src="assets/khaman-maluach-game-02.png" alt="">
    <div class="shade"></div>
    <div class="rail"></div>
    <div class="content">
      <div class="top">
        <div class="issue">Issue 04 / Game 02 Postgame</div>
      </div>
      <div class="result">
        <p class="title">Suns Summer League Pulse / Final</p>
        <div class="score" aria-label="Phoenix 75, New Orleans 81">
          <div class="side"><span>Phoenix</span><strong>75</strong></div>
          <div class="dash">-</div>
          <div class="side"><span>New Orleans</span><strong>81</strong></div>
        </div>
        <p class="thesis">Maluach delivers<br>again.</p>
      </div>
      <div class="footer">
        <div class="footer-copy"><strong>Private Owner Briefing</strong><span>Verified public information / AVC interpretation</span></div>
        <img class="avc" src="assets/avc-logo-full-dark.svg" alt="">
        <div class="seal"><span>Prepared for<br>Mat Ishbia</span><img class="suns" src="assets/phoenix-suns-logo.png" alt=""></div>
      </div>
    </div>
  </main>
</body>
</html>
